services:
  cron_job:
    container_name: meme-job
    image: meme-job
    build: .
    restart: always
    # No host volume here: Coolify can't interpolate ${VAR} in volumes, so the /funny bind is
    # declared in the homelab coolify-apps.ts manifest and pushed per-resource via the storages
    # API (host path stays out of this repo). For a local Docker run, add a docker-compose
    # .override.yml with `volumes: ["./memes:/funny"]`, or just run `bun job/meme-poster.ts`.
    environment:
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN}
      SLACK_CHANNEL_ID: ${SLACK_CHANNEL_ID}
      MEMES_DIR: ${MEMES_DIR}
      TZ: ${TZ}
      POST_CRON: ${POST_CRON}
      POST_MEME_ON_STARTUP: ${POST_MEME_ON_STARTUP:-}
      REDDIT_SUBREDDIT: ${REDDIT_SUBREDDIT:-}
      REDDIT_POST_CRON: ${REDDIT_POST_CRON:-}
      REDDIT_POST_ON_STARTUP: ${REDDIT_POST_ON_STARTUP:-}
    healthcheck:
      test: ["CMD-SHELL", "pgrep crond || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s
