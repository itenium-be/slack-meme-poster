services:
  cron_job:
    container_name: meme-job
    image: meme-job
    build: .
    restart: always
    volumes:
      # Local dev only. On Coolify (dockerfile build pack) the /memes bind is supplied
      # per-resource via the storages API — see homelab coolify-apps.ts mountsByTier;
      # Coolify ignores this compose file. Defaults to the repo's sample memes/.
      - ${MEMES_DIR:-./memes}:/memes
    environment:
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN}
      SLACK_CHANNEL_ID: ${SLACK_CHANNEL_ID}
      MEMES_DIR: ${MEMES_DIR}
      TZ: ${TZ}
      POST_CRON: ${POST_CRON}
      POST_MEME_ON_STARTUP: ${POST_MEME_ON_STARTUP:-}
      REDDIT_SUBREDDIT: ${REDDIT_SUBREDDIT:-}
      REDDIT_POST_CRON: ${REDDIT_POST_CRON:-}
      REDDIT_POST_ON_STARTUP: ${REDDIT_POST_ON_STARTUP:-}
    healthcheck:
      test: ["CMD-SHELL", "pgrep crond || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s
