services:
  cron_job:
    container_name: meme-job
    image: meme-job
    build: .
    restart: always
    volumes:
      # MEMES_DIR is the host path (per-tier, set in Coolify): the NFS-mounted Dropbox folder.
      - ${MEMES_DIR}:/memes
    environment:
      # Set per resource in Coolify. SLACK_BOT_TOKEN is the only secret; TIER (dev|prod)
      # picks which committed deploy/<tier>.env start.sh sources for the rest of the config.
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN}
      TIER: ${TIER}
    # Worker has no HTTP port — liveness is "is cron running?".
    healthcheck:
      test: ["CMD-SHELL", "pgrep crond || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s
